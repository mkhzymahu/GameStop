name: gamestop_app
description: A GameStop style e-commerce app for PC hardware and games
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.1
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  lottie: ^3.3.2
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^17.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Handling
  cached_network_image: ^3.3.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  
  # Payment (for demo purposes - in production use actual payment gateway)
  credit_card_scanner: ^1.0.0
  
  # HTTP requests
  dio: ^5.4.0
  
  # Forms & Validation
  flutter_form_builder: ^10.3.0+1
  form_builder_validators: ^11.3.0
  
  # Utils
  url_launcher: ^6.2.1
  image_picker: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/